# Publish @openfantasymap/lcars-ngx to npm (public) on a version tag.
#
#   git tag v0.2.0 && git push origin v0.2.0   →   publishes 0.2.0
#
# Angular library: ng-packagr emits a clean package into dist/ (we publish from
# there). Builds against the PUBLISHED @openfantasymap/lcars-core (publish core
# first). Needs Node 20 (Angular 20). Requires repo secret NPM_TOKEN.
name: Publish lcars-ngx

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      core-version:
        description: '@openfantasymap/lcars-core version to build against'
        default: latest
      dist-tag:
        description: npm dist-tag
        default: latest

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish-lcars-ngx-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Use published core
        run: npm pkg set "devDependencies.@openfantasymap/lcars-core=${{ github.event.inputs.core-version || 'latest' }}"

      - run: npm install --no-audit --no-fund

      - name: Build (ng-packagr → dist/)
        run: npm run build

      - name: Verify tag matches package.json version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          PKG="$(node -p "require('./package.json').version")"
          TAG="${GITHUB_REF_NAME#v}"
          echo "package=$PKG tag=$TAG"
          [ "$PKG" = "$TAG" ] || { echo "::error::tag v$TAG does not match package.json $PKG"; exit 1; }

      - name: Publish to npm (from ng-packagr output)
        working-directory: dist
        run: npm publish --provenance --access public --tag "${{ github.event.inputs.dist-tag || 'latest' }}"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
